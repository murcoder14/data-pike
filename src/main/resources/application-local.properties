# Local runtime settings
execution.mode=local

# RabbitMQ Streams
rabbitmq.host=localhost
rabbitmq.port=5552
rabbitmq.username=
rabbitmq.password=
rabbitmq.virtual.host=/
rabbitmq.stream.name=weather-stream
rabbitmq.consumer.name=data-pike-local-consumer
