# LOCAL_AWS mode: exercises the production code path (Kinesis → MessageParser → S3FileReader → IcebergSink)
# against a local MiniStack emulator instead of real AWS.
# All values here are defaults; env vars injected by docker-compose.localaws.yml take precedence at runtime.
execution.mode=local_aws

# Kinesis — points at MiniStack's emulated stream
kinesis.initial.position=TRIM_HORIZON
ministack.endpoint=http://localhost:4566
kinesis.stream.arn=arn:aws:kinesis:us-east-1:000000000000:stream/weather-stream
kinesis.aws.region=us-east-1

# Iceberg — JDBC catalog backed by the same Postgres container as LOCAL mode
iceberg.warehouse.path=file:///tmp/data-pike/iceberg-warehouse
iceberg.catalog.name=local_catalog
iceberg.table.name=weather_db.temperature_summary
iceberg.jdbc.uri=jdbc:postgresql://localhost:5432/iceberg_catalog
iceberg.jdbc.user=
iceberg.jdbc.password=
