services:
  ministack:
    image: ministackorg/ministack:latest
    container_name: data-pike-ministack
    hostname: ministack
    ports:
      - "4566:4566"
    environment:
      AWS_DEFAULT_REGION: us-east-1
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4566/_ministack/health')\""]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-bookworm
    container_name: data-pike-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iceberg_catalog}
      POSTGRES_USER: ${POSTGRES_USER:-iceberg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iceberg_password}
    ports:
      - "5433:5432"
    volumes:
      - ./local-data/postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iceberg_user} -d ${POSTGRES_DB:-iceberg_catalog}"]
      interval: 10s
      timeout: 5s
      retries: 10

  jobmanager:
    image: flink:scala_2.12-java17
    container_name: data-pike-flink-jobmanager
    hostname: jobmanager
    depends_on:
      ministack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      EXECUTION_MODE: local_aws
      # MiniStack endpoint — all AWS SDK calls inside the Flink JVM use this
      AWS_ENDPOINT_URL: http://ministack:4566
      MINISTACK_ENDPOINT: http://ministack:4566
      # Dummy credentials required by AWS SDK — MiniStack accepts any value
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      # Kinesis stream ARN (MiniStack uses account ID 000000000000)
      KINESIS_STREAM_ARN: arn:aws:kinesis:us-east-1:000000000000:stream/weather-stream
      KINESIS_INITIAL_POSITION: TRIM_HORIZON
      # Iceberg — same JDBC catalog as LOCAL mode (backed by Postgres)
      ICEBERG_WAREHOUSE_PATH: file:///opt/flink/local-warehouse
      ICEBERG_CATALOG_NAME: local_catalog
      ICEBERG_TABLE_NAME: weather_db.temperature_summary
      ICEBERG_JDBC_URI: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-iceberg_catalog}
      ICEBERG_JDBC_USER: ${ICEBERG_JDBC_USER:-iceberg_user}
      ICEBERG_JDBC_PASSWORD: ${ICEBERG_JDBC_PASSWORD:-iceberg_password}
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        state.backend.type: hashmap
        execution.checkpointing.checkpoint-storage: filesystem
        execution.checkpointing.checkpoints-dir: file:///opt/flink/checkpoints
        execution.checkpointing.savepoint-dir: file:///opt/flink/savepoints
    volumes:
      - ./target:/opt/flink/usrlib
      - ./local-data/warehouse:/opt/flink/local-warehouse
      - ./local-data/checkpoints:/opt/flink/checkpoints
      - ./local-data/savepoints:/opt/flink/savepoints

  taskmanager:
    image: flink:scala_2.12-java17
    container_name: data-pike-flink-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      AWS_ENDPOINT_URL: http://ministack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
    volumes:
      - ./target:/opt/flink/usrlib
      - ./local-data/warehouse:/opt/flink/local-warehouse
      - ./local-data/checkpoints:/opt/flink/checkpoints
      - ./local-data/savepoints:/opt/flink/savepoints

  trino:
    image: trinodb/trino:480
    container_name: data-pike-trino
    hostname: trino
    depends_on:
      jobmanager:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iceberg_catalog}
      ICEBERG_JDBC_USER: ${ICEBERG_JDBC_USER:-iceberg_user}
      ICEBERG_JDBC_PASSWORD: ${ICEBERG_JDBC_PASSWORD:-iceberg_password}
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
      - ./local-data/warehouse:/opt/flink/local-warehouse
