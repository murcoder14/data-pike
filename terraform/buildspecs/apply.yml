version: 0.2
phases:
  install:
    commands:
      - echo "Installing Terraform..."
      - export TF_VERSION=1.14.8
      - TF_ZIP="terraform_${TF_VERSION}_linux_amd64.zip"
      - curl -fsSLO "https://releases.hashicorp.com/terraform/${TF_VERSION}/${TF_ZIP}"
      - curl -fsSLO "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_SHA256SUMS"
      - grep " ${TF_ZIP}$" "terraform_${TF_VERSION}_SHA256SUMS" > terraform_SHA256SUMS_linux_amd64
      - sha256sum -c terraform_SHA256SUMS_linux_amd64
      - unzip -o "${TF_ZIP}" -d /usr/local/bin/
      - terraform --version
  pre_build:
    commands:
      - echo "Initializing Terraform..."
      - cd terraform
      - cp "${CODEBUILD_SRC_DIR_plan_output}/terraform/tfplan" ./tfplan
      - terraform init -input=false
          -backend-config="bucket=${TF_STATE_BUCKET}"
          -backend-config="key=${TF_STATE_KEY}"
          -backend-config="region=${TF_STATE_REGION}"
          -backend-config="use_lockfile=true"
          -backend-config="encrypt=true"
  build:
    commands:
      - terraform show -no-color tfplan > /tmp/plan_text.txt
      - PLAN_SUMMARY=$(grep '^Plan:' /tmp/plan_text.txt || true)
      - |
        if [ -z "${PLAN_SUMMARY}" ]; then
          echo "ERROR - could not parse plan summary"
          exit 1
        fi
      - echo "Plan summary - ${PLAN_SUMMARY}"
      - DESTROY_COUNT=$(echo "${PLAN_SUMMARY}" | sed -E 's/.* ([0-9]+) to destroy.*/\1/' | grep -E '^[0-9]+$' || echo "0")
      - |
        if [ "${DESTROY_COUNT}" -gt 0 ] 2>/dev/null; then
          echo "ERROR - plan includes ${DESTROY_COUNT} destroy actions"
          exit 1
        fi
      - echo "Applying Terraform plan..."
      - terraform apply -input=false -auto-approve tfplan
      - echo "Terraform apply complete."
